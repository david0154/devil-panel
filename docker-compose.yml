version: '3.9'

networks:
  devilpanel:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
  prometheus_data:
  rabbitmq_data:
  letsencrypt_data:
  powerdns_data:

services:
  # ==========================================
  # POSTGRESQL DATABASE
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: devilpanel-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-devilpanel}
      POSTGRES_USER: ${DB_USER:-devilpanel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/database/migrations:/docker-entrypoint-initdb.d
    networks:
      - devilpanel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devilpanel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # REDIS CACHE
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: devilpanel-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - devilpanel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # RABBITMQ QUEUE
  # ==========================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: devilpanel-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-devilpanel}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitpassword}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/devilpanel}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - devilpanel
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================
  # MINIO OBJECT STORAGE
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: devilpanel-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-devilpanel}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-miniopassword}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - devilpanel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==========================================
  # POWERDNS
  # ==========================================
  powerdns:
    image: powerdns/pdns-auth-48:latest
    container_name: devilpanel-powerdns
    restart: always
    environment:
      PDNS_AUTH_API_KEY: ${POWERDNS_API_KEY:-powerdns-api-key}
    volumes:
      - powerdns_data:/var/lib/powerdns
      - ./dns/pdns.conf:/etc/powerdns/pdns.conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8053:8081"
    networks:
      - devilpanel

  # ==========================================
  # MAIN BACKEND (GOLANG)
  # ==========================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: devilpanel-api
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - letsencrypt_data:/etc/letsencrypt
    networks:
      - devilpanel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # FRONTEND (NEXT.JS)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devilpanel-frontend
    restart: always
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - devilpanel

  # ==========================================
  # AI ASSISTANT (OLLAMA + PHI-3 MINI)
  # ==========================================
  ai:
    image: ollama/ollama:latest
    container_name: devilpanel-ai
    restart: always
    volumes:
      - ./ai/models:/root/.ollama
      - ./ai/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    ports:
      - "11434:11434"
    networks:
      - devilpanel
    deploy:
      resources:
        limits:
          memory: 2G

  # ==========================================
  # NGINX REVERSE PROXY
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: devilpanel-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - letsencrypt_data:/etc/letsencrypt
      - ./frontend/public:/usr/share/nginx/html/static
    depends_on:
      - api
      - frontend
    networks:
      - devilpanel

  # ==========================================
  # PROMETHEUS METRICS
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: devilpanel-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - devilpanel

  # ==========================================
  # GRAFANA DASHBOARD
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: devilpanel-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-grafanapassword}
      GF_SERVER_ROOT_URL: https://${MONITOR_DOMAIN:-localhost}/grafana
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    networks:
      - devilpanel

  # ==========================================
  # NODE EXPORTER (SYSTEM METRICS)
  # ==========================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: devilpanel-node-exporter
    restart: always
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - devilpanel
